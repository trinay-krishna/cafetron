spring:
  application:
    name: cafetron-backend

  datasource:
    url: jdbc:mysql://localhost:3306/cafetron?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:cafetron}
    password: ${DB_PASSWORD:cafetron}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Use 'update' in dev only. Switch to 'validate' + Flyway/Liquibase for real deployments.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

# --- Application-specific config ---
cafetron:
  jwt:
    # Replace with a long random base64 secret in a real env (env var, not committed).
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMTIzNDU2Nzg=}
    expiration-ms: 86400000        # 24h
  order:
    cancel-window-minutes: 5       # Module 3
    daily-cutoff: "15:00"          # Module 6 (simple LocalTime check, no Quartz)
